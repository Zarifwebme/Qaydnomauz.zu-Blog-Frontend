{% load static %}
<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <!-- Security Meta Tags -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- SEO Meta -->
  <title>Parolni yangilash — Qaydnoma Blog</title>
  <meta name="description" content="Qaydnoma Blog hisobingiz parolini yangilang.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Theme Color -->
  <meta name="theme-color" content="#ff2d2d">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/32px.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/16px.png' %}">
  <link rel="apple-touch-icon" href="{% static 'images/32px.png' %}">
  <link rel="manifest" href="{% static 'manifest.json' %}">

  <script>
    (function () {
      const saved = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
<!-- ========== NAVBAR ========== -->
<nav class="navbar navbar-blur sticky-top">
  <div class="container">

    <a class="navbar-brand brand-red fw-bold" href="/">Qaydnoma Blog</a>

    <!-- Desktop: theme + auth -->
    <div class="d-none d-lg-flex align-items-center gap-2 ms-auto">
      <button id="themeToggle" class="btn btn-light border nav-icon-btn" type="button" aria-label="Mavzuni almashtirish">
        <i class="bi bi-moon-stars"></i>
      </button>
      <div id="navAuthBox"></div>
    </div>

    <!-- Hamburger (faqat mobilda) -->
    <button class="navbar-toggler border-0 d-lg-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" aria-label="Menyu">
      <i class="bi bi-list fs-2"></i>
    </button>

    <!-- Mobil collapse -->
    <div class="collapse navbar-collapse" id="mainNavbar">
      <div class="navbar-nav-group">
        <button id="themeToggleMobile" class="btn btn-light border nav-icon-btn w-100" type="button" aria-label="Mavzuni almashtirish">
          <i class="bi bi-moon-stars"></i>
        </button>
        <div id="navAuthBoxMobile"></div>
      </div>
    </div>

  </div>
</nav>

<div class="container py-5" style="max-width:620px;">
  <h3 class="fw-bold mb-2">Yangi parol o'rnatish</h3>

  <div id="msg" class="mb-3"></div>

    <form id="form" class="card border-0 shadow-sm rounded-4 p-4">
      <div class="mb-3">
        <label class="form-label">Yangi parol</label>
        <input class="form-control" id="password1" type="password" required>
      </div>
  
      <div class="mb-3">
        <label class="form-label">Yangi parol (takror)</label>
        <input class="form-control" id="password2" type="password" required>
      </div>
  
      <button class="btn btn-primary w-100" type="submit">Parolni yangilash</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script type="module" src="{% static 'js/reset-password.js' %}"></script>
<script src="{% static 'js/footer.js' %}"></script>
<script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
