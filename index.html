<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <!-- Security Meta Tags -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- SEO Meta -->
  <title>Qaydnoma Blog — Texnologiya va dasturlash haqida maqolalar</title>
  <meta name="description" content="Qaydnoma Blog — dasturlash, texnologiya, web development va IT sohasidagi eng so'nggi maqolalar va qo'llanmalar.">
  <meta name="keywords" content="blog, dasturlash, texnologiya, web development, IT, o'zbek, qaydnoma">
  <meta name="author" content="Qaydnoma Blog">
  <link rel="canonical" href="https://qaydnomauz.uz/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Qaydnoma Blog — Texnologiya va dasturlash haqida maqolalar">
  <meta property="og:description" content="Qaydnoma Blog — dasturlash, texnologiya, web development va IT sohasidagi eng so'nggi maqolalar va qo'llanmalar.">
  <meta property="og:url" content="https://qaydnomauz.uz/">
  <meta property="og:image" content="https://qaydnomauz.uz/assets/images/og-default.jpg">
  <meta property="og:site_name" content="Qaydnoma Blog">
  <meta property="og:locale" content="uz_UZ">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Qaydnoma Blog — Texnologiya va dasturlash haqida maqolalar">
  <meta name="twitter:description" content="Qaydnoma Blog — dasturlash, texnologiya, web development va IT sohasidagi eng so'nggi maqolalar va qo'llanmalar.">
  <meta name="twitter:image" content="https://qaydnomauz.uz/assets/images/og-default.jpg">

  <!-- Theme Color -->
  <meta name="theme-color" content="#ff2d2d">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/32px.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/16px.png">
  <link rel="apple-touch-icon" href="assets/images/32px.png">
  <link rel="manifest" href="manifest.json">

  <script>
    (function () {
      const saved = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = saved || (prefersDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- MUHIM -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
  <link href="assets/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH" crossorigin="anonymous">
</head>
<body>
<!-- ========== NAVBAR ========== -->
<nav class="navbar navbar-blur sticky-top">
  <div class="container">

    <!-- Row 1: Brand + Desktop Search/Theme/Auth + Hamburger -->
    <a class="navbar-brand brand-red fw-bold" href="#/">Qaydnoma Blog</a>

    <!-- Desktop: search, theme, auth bir qatorda -->
    <div class="d-none d-lg-flex align-items-center gap-2 ms-auto">
      <div class="input-group nav-search-box">
        <span class="input-group-text border-end-0"><i class="bi bi-search"></i></span>
        <input type="text" id="qTop" class="form-control border-start-0" placeholder="Qidiring...">
      </div>
      <button id="themeToggle" class="btn btn-light border nav-icon-btn" type="button" aria-label="Mavzuni almashtirish">
        <i class="bi bi-moon-stars"></i>
      </button>
      <div id="navAuthBox"></div>
    </div>

    <!-- Hamburger (faqat mobilda) -->
    <button class="navbar-toggler border-0 d-lg-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" aria-label="Menyu">
      <i class="bi bi-list fs-2"></i>
    </button>

    <!-- Row 2 (mobil): Search input — collapse ichida emas! -->
    <div class="nav-mobile-search d-lg-none">
      <div class="input-group">
        <span class="input-group-text border-end-0"><i class="bi bi-search"></i></span>
        <input type="text" id="qMobile" class="form-control border-start-0" placeholder="Qidiring...">
      </div>
    </div>

    <!-- Row 3 (mobil): Hamburger collapse — faqat theme + auth -->
    <div class="collapse navbar-collapse" id="mainNavbar">
      <div class="navbar-nav-group">
        <button id="themeToggleMobile" class="btn btn-light border nav-icon-btn w-100" type="button" aria-label="Mavzuni almashtirish">
          <i class="bi bi-moon-stars"></i>
        </button>
        <div id="navAuthBoxMobile"></div>
      </div>
    </div>

  </div>
</nav>

<!-- HOME VIEW -->
<div id="homeView">
<div class="container py-3" style="max-width: 1100px;">
  <div class="cat-scroll mb-3" id="catBar"></div>

  <h4 class="mb-3" id="pageTitle">Barcha blog postlari</h4>

  <div class="row g-3" id="postsGrid"></div>

  <nav class="mt-4 d-flex justify-content-center" aria-label="Pagination">
    <div class="pagination-wrapper" id="paginationBox"></div>
  </nav>
</div>
</div>

<!-- POST VIEW -->
<div id="postView" style="display:none">
<div class="container py-2" style="max-width: 1100px;">
  <a href="#/" class="btn-back">
    <i class="bi bi-arrow-left"></i> Orqaga
  </a>

  <div class="row mt-3 g-4">
    <!-- CHAP TARAF: asosiy post -->
    <div class="col-12 col-lg-8">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <img id="postImg" class="post-detail-img" src="" alt="">
        <div class="card-body">
          <div class="d-flex gap-2 align-items-center">
            <div class="text-muted small" id="postDate"></div>
            <span class="text-muted small">&bull;</span>
            <div class="text-muted small" id="postViews">
              <i class="bi bi-eye"></i> 0
            </div>
          </div>
          <h2 class="fw-bold mt-2" id="postTitle"></h2>
          <hr>
          <div id="postDesc" class="markdown-body"></div>
        </div>
      </div>

      <div class="mt-4">
        <h5 class="fw-bold mb-3">Kommentlar</h5>
        <div id="commentInfo" class="mb-2"></div>

        <form id="commentForm" class="card border-0 shadow-sm rounded-4 p-3 d-none" action="javascript:void(0);">
          <div class="mb-2">
            <textarea class="form-control" id="commentText" rows="3" placeholder="Komment yozing..."></textarea>
          </div>
          <div class="d-flex justify-content-end">
            <button class="btn btn-primary" type="button" id="btnSendComment">Yuborish</button>
          </div>
        </form>

        <div class="mt-3 comments-box" id="commentsList"></div>
      </div>
    </div>

    <!-- O'NG TARAF: related posts -->
    <div class="col-12 col-lg-4">
      <div class="card border-0 shadow-sm rounded-4 p-3">
        <h5 class="fw-bold mb-3">Shu kategoriya postlari</h5>
        <div id="relatedPosts"></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- 404 VIEW -->
<div id="notFoundView" style="display:none">
<div class="container py-5 text-center">
  <h1 class="display-1 fw-bold text-muted">404</h1>
  <p class="lead mb-4">Sahifa topilmadi</p>
  <a href="#/" class="btn btn-primary rounded-pill px-4">Bosh sahifa</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" integrity="sha384-8hAfZQ5Oqos5HLTHfR0sLvvwpcVI4fGhV+0Dj/HCcpkKaacivQs82XHmvLOnAhXn" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous"></script>
<script type="module" src="assets/js/router.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/theme.js"></script>
</body>
</html>
